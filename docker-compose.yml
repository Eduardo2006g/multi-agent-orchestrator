version: '3.8'

services:
  redis:
    image: redis/redis-stack-server:latest
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - oraculo-network

  agent:
    build:
      context: ./multiagent
      dockerfile: Dockerfile
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - oraculo-network
    environment:
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env
    stdin_open: true
    tty: true

networks:
  oraculo-network:
    driver: bridge
